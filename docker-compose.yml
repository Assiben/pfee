services:
  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    networks:
      - pfe-net

  kafka:
    image: wurstmeister/kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CREATE_TOPICS: "history_data:1:1"
    networks:
      - pfe-net

  vector:
    image: timberio/vector:0.36.0-debian
    container_name: vector
    volumes:
      - ./vector.toml:/etc/vector/vector.toml
      - ./data:/data
    command: ["--config", "/etc/vector/vector.toml"]
    ports:
      - "6000:6000"
    depends_on:
      - kafka
    networks:
      - pfe-net

  python_sender:
    image: python:3.12
    container_name: python_sender
    volumes:
      - ./data:/data
      - ./send_csv_to_vector.py:/app/send_csv_to_vector.py
    working_dir: /app
    command: >
      sh -c "
      apt update &&
      apt install -y netcat-openbsd &&
      until nc -z vector 6000; do
        echo 'Waiting for Vector...';
        sleep 2;
      done;
      echo 'Vector is up, starting sender...';
      python send_csv_to_vector.py
      "
    networks:
      - pfe-net
    depends_on:
      - vector
    restart: on-failure

  # ---------------- ClickHouse (remplace StarRocks) ----------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - pfe-net
  # ---------------- Grafana ----------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - pfe-net

  # ---------------- MinIO ----------------
  minio1:
    image: quay.io/minio/minio:latest
    container_name: minio1
    hostname: minio1
    command: server http://minio{1...3}/data --console-address ":9001"
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio1-data:/data
    networks:
      - pfe-net

  minio2:
    image: quay.io/minio/minio:latest
    container_name: minio2
    hostname: minio2
    command: server http://minio{1...3}/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio2-data:/data
    networks:
      - pfe-net

  minio3:
    image: quay.io/minio/minio:latest
    container_name: minio3
    hostname: minio3
    command: server http://minio{1...3}/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio3-data:/data
    networks:
      - pfe-net

  unzipper:
    image: ubuntu:24.04
    container_name: unzipper
    volumes:
      - ./data:/data
      - ./unzip.sh:/unzip.sh
    command: bash /unzip.sh
    networks:
      - pfe-net

networks:
  pfe-net:
    driver: bridge

volumes:
  grafana-data:
  clickhouse-data:
  minio1-data:
  minio2-data:
  minio3-data: